<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>10點轉盤後台管理</title>
  <link rel="stylesheet" href="../shared/style.css" />
  <!-- Pico.css：輕量化 CSS 框架以優化表單/按鈕/排版 -->
  <link rel="stylesheet" href="https://unpkg.com/@picocss/pico@latest/css/pico.min.css" />
  <link rel="stylesheet" href="../shared/admin.css" />
</head>
<body data-theme="dark">
  <div class="container">
    <h2>10點轉盤後台管理</h2>
    <div class="card">
      <!-- 已改為由 config.js 設定，並自動載入資料；以下設定輸入區塊移除 -->
      <div class="status" id="status"></div>

      <div class="table-wrap">
      <table id="dataTable">
        <thead>
          <tr>
            <th class="col-idx">#</th>
            <th class="col-label">獎項（label）</th>
            <th class="col-prob">機率（weight / %）</th>
            <th class="col-color">顏色（color）</th>
            <th class="col-actions">操作</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      </div>

      <div class="row admin-actions">
        <button class="btn" id="addRowBtn">新增一列</button>
        <div class="flex-grow"></div>
        <button class="btn danger" id="resetBtn">清空所有列</button>
        <button class="btn primary" id="saveBtn">儲存到後端</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="../shared/admin.js"></script>
</body>
</html>
