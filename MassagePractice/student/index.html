<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>學員系統</title>
    <script>
      (function () {
        try {
          if (localStorage.getItem("massageTheme") === "dark") {
            document.documentElement.dataset.theme = "dark";
          }
        } catch (error) {}
      })();
    </script>
    <link rel="stylesheet" href="css/styles.css?v=20260507-2" />
  </head>
  <body>
    <header class="topbar">
      <span class="brand">學員審核系統</span>
      <div class="topbar__actions">
        <button class="theme-toggle" id="themeToggle" type="button" aria-pressed="false" aria-label="切換亮暗色調">
          <span class="theme-toggle__icon" id="themeToggleIcon" aria-hidden="true">☀</span>
          <span id="themeToggleText">亮色調</span>
        </button>
      </div>
    </header>

    <main class="workspace workspace--student">
      <section class="student-panel" aria-labelledby="student-title">
        <div class="student-panel__copy">
          <p class="eyebrow">Student Portal</p>
          <h1 id="student-title">學員 LINE 登入</h1>
        </div>

        <div class="auth-surface">
          <div class="status-strip" id="statusStrip">
            <span class="status-dot status-dot--idle" id="statusDot"></span>
            <span id="statusText">尚未登入</span>
          </div>

          <div class="profile" id="profile" hidden>
            <img class="profile__avatar" id="profileAvatar" src="" alt="" />
            <div class="profile__meta">
              <strong id="profileName"></strong>
            </div>
          </div>

          <div class="notice" id="notice" role="status">
            系統會自動開啟 LINE 登入，並送出資料等待師資審核。
          </div>
          <div class="location-hint" id="locationHint" hidden></div>

          <div class="student-view-tabs" id="studentViewTabs" role="tablist" aria-label="學員功能" hidden>
            <button
              class="student-view-tab is-active"
              id="attendanceViewTab"
              data-student-view="attendance"
              type="button"
              role="tab"
              aria-controls="attendancePanel"
              aria-selected="true"
            >
              簽到狀態
            </button>
            <button
              class="student-view-tab"
              id="practiceViewTab"
              data-student-view="practice"
              type="button"
              role="tab"
              aria-controls="practicePanel"
              aria-selected="false"
            >
              練習紀錄
            </button>
          </div>

          <div class="attendance-panel" id="attendancePanel" role="tabpanel" aria-labelledby="attendanceViewTab" hidden>
            <div class="attendance-header">
              <h2>簽到狀態</h2>
              <span class="attendance-state" id="attendanceState">尚未簽到</span>
            </div>

            <div class="button-row">
              <button class="button button--checkin" id="checkInButton" type="button">簽到</button>
              <button class="button button--checkout" id="checkOutButton" type="button">簽退</button>
            </div>

            <div class="attendance-list" id="attendanceList"></div>
          </div>

          <div class="practice-panel" id="practicePanel" role="tabpanel" aria-labelledby="practiceViewTab" hidden>
            <div class="attendance-header">
              <h2>練習紀錄</h2>
              <span class="attendance-state" id="practiceState">尚未練習</span>
            </div>

            <div class="practice-fields">
              <div class="practice-field-group">
                <label for="practiceTargetSelect">練習對象</label>
                <select id="practiceTargetSelect"></select>
                <label class="practice-other-field" id="practiceTargetOtherField" for="practiceTargetOtherInput" hidden>
                  其他練習對象
                  <input id="practiceTargetOtherInput" type="text" maxlength="60" placeholder="輸入練習對象" />
                </label>
              </div>
              <div class="practice-field-group">
                <label for="practiceItemSelect">練習項目</label>
                <select id="practiceItemSelect"></select>
                <label class="practice-other-field" id="practiceItemOtherField" for="practiceItemOtherInput" hidden>
                  其他練習項目
                  <input id="practiceItemOtherInput" type="text" maxlength="60" placeholder="輸入練習項目" />
                </label>
              </div>
            </div>

            <div class="button-row">
              <button class="button button--checkin" id="startPracticeButton" type="button">開始練習</button>
            </div>

            <div class="attendance-list" id="practiceList"></div>
          </div>

          <div class="button-row">
            <button class="button button--ghost" id="refreshButton" type="button" hidden>更新狀態</button>
          </div>
        </div>
      </section>
    </main>

    <section class="practice-timer" id="practiceTimerOverlay" aria-labelledby="practiceTimerTitle" role="dialog" aria-modal="true" hidden>
      <div class="practice-timer__inner">
        <p class="practice-timer__label">練習中</p>
        <h2 id="practiceTimerTitle">正計時</h2>
        <output class="practice-timer__time" id="practiceTimerValue">00:00:00</output>
        <p class="practice-timer__meta" id="practiceTimerMeta"></p>
        <p class="practice-timer__started" id="practiceTimerStartedAt"></p>
        <button class="button button--timer-end" id="endPracticeButton" type="button">結束練習</button>
      </div>
    </section>

    <script src="js/api.js?v=20260507-1"></script>
    <script src="js/student.js?v=20260507-5"></script>
  </body>
</html>
