<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>師資系統</title>
    <link rel="stylesheet" href="css/styles.css?v=20260506-7" />
  </head>
  <body>
    <header class="topbar">
      <span class="brand">學員審核系統</span>
    </header>

    <main class="workspace workspace--teacher">
      <section class="teacher-header" aria-labelledby="teacher-title">
        <div>
          <p class="eyebrow">Teacher Console</p>
          <h1 id="teacher-title">學員審核</h1>
        </div>
        <div class="admin-login" id="adminLogin">
          <label for="adminKey">管理密鑰</label>
          <input id="adminKey" type="password" autocomplete="current-password" placeholder="輸入 GAS ADMIN_KEY" />
          <button class="button" id="connectButton" type="button">連線</button>
        </div>
      </section>

      <nav class="teacher-tabs" aria-label="師資系統功能">
        <button class="teacher-tab is-active" data-view="studentsView" type="button" aria-selected="true">學員</button>
        <button class="teacher-tab" data-view="practiceTargetsView" type="button" aria-selected="false">練習對象</button>
        <button class="teacher-tab" data-view="practiceItemsView" type="button" aria-selected="false">練習項目</button>
      </nav>

      <section class="teacher-view" id="studentsView">
        <section class="toolbar" aria-label="列表工具">
          <div class="metric">
            <span>全部</span>
            <strong id="totalCount">0</strong>
          </div>
          <div class="metric metric--pending">
            <span>待審核</span>
            <strong id="pendingCount">0</strong>
          </div>
          <div class="metric metric--approved">
            <span>已通過</span>
            <strong id="approvedCount">0</strong>
          </div>
          <div class="list-controls">
            <input id="searchInput" type="search" placeholder="搜尋學員名稱" />
            <select id="statusFilter" aria-label="狀態篩選">
              <option value="all">全部狀態</option>
              <option value="pending">待審核</option>
              <option value="approved">已通過</option>
              <option value="rejected">未通過</option>
            </select>
            <button class="button button--ghost" id="reloadButton" type="button">重新整理</button>
          </div>
        </section>

        <section class="table-region" aria-live="polite">
          <div class="empty-state" id="emptyState">
            輸入管理密鑰後載入學員名單。
          </div>

          <div class="table-wrap" id="tableWrap" hidden>
            <table>
              <thead>
                <tr>
                  <th>學員</th>
                  <th>狀態</th>
                  <th>建立時間</th>
                  <th>更新時間</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="studentsBody"></tbody>
            </table>
          </div>
        </section>

        <section class="attendance-region" id="attendanceRegion" aria-live="polite" hidden>
          <div class="attendance-region__header">
            <div>
              <p class="eyebrow">Attendance Records</p>
              <h2 id="attendanceTitle">簽到紀錄</h2>
            </div>
            <button class="button button--ghost" id="closeAttendanceButton" type="button">關閉</button>
          </div>

          <div class="empty-state" id="attendanceEmpty" hidden></div>

          <div class="table-wrap" id="attendanceTableWrap" hidden>
            <table class="attendance-table">
              <thead>
                <tr>
                  <th>簽到時間</th>
                  <th>簽退時間</th>
                  <th>停留時間</th>
                  <th>狀態</th>
                </tr>
              </thead>
              <tbody id="attendanceBody"></tbody>
            </table>
          </div>
        </section>

        <section class="attendance-region" id="practiceRecordRegion" aria-live="polite" hidden>
          <div class="attendance-region__header">
            <div>
              <p class="eyebrow">Practice Records</p>
              <h2 id="practiceRecordTitle">練習紀錄</h2>
            </div>
            <button class="button button--ghost" id="closePracticeRecordButton" type="button">關閉</button>
          </div>

          <div class="empty-state" id="practiceRecordEmpty" hidden></div>

          <div class="table-wrap" id="practiceRecordTableWrap" hidden>
            <table class="practice-record-table">
              <thead>
                <tr>
                  <th>練習對象</th>
                  <th>練習項目</th>
                  <th>開始時間</th>
                  <th>結束時間</th>
                  <th>練習時間</th>
                  <th>狀態</th>
                </tr>
              </thead>
              <tbody id="practiceRecordBody"></tbody>
            </table>
          </div>
        </section>
      </section>

      <section class="teacher-view" id="practiceTargetsView" hidden>
        <section class="practice-manager">
          <div>
            <p class="eyebrow">Practice Targets</p>
            <h2>練習對象</h2>
            <p class="manager-note">固定包含「其他」，學員選擇後可自行輸入對象。</p>
          </div>
          <div class="practice-form">
            <input id="practiceTargetInput" type="text" placeholder="新增練習對象" />
            <button class="button" id="addPracticeTargetButton" type="button">新增</button>
          </div>
          <div class="option-list" id="practiceTargetList">輸入管理密鑰後載入。</div>
        </section>
      </section>

      <section class="teacher-view" id="practiceItemsView" hidden>
        <section class="practice-manager">
          <div>
            <p class="eyebrow">Practice Items</p>
            <h2>練習項目</h2>
            <p class="manager-note">固定包含「其他」，學員選擇後可自行輸入項目。</p>
          </div>
          <div class="practice-form">
            <input id="practiceItemInput" type="text" placeholder="新增練習項目" />
            <button class="button" id="addPracticeItemButton" type="button">新增</button>
          </div>
          <div class="option-list" id="practiceItemList">輸入管理密鑰後載入。</div>
        </section>
      </section>
    </main>

    <script src="js/api.js?v=20260506-7"></script>
    <script src="js/teacher.js?v=20260506-7"></script>
  </body>
</html>
