<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>學員審核系統</title>
    <style>
      :root {
        --bg: #f7f8f5;
        --surface: #ffffff;
        --ink: #17201b;
        --muted: #69736d;
        --border: #dde4dc;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100svh;
        margin: 0;
        background: var(--bg);
        color: var(--ink);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .shell {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .entry {
        display: grid;
        grid-template-columns: minmax(0, 1.05fr) minmax(280px, 0.95fr);
        gap: 48px;
        width: min(960px, 100%);
        align-items: center;
      }

      h1 {
        margin: 8px 0 16px;
        font-size: clamp(2rem, 3.4vw, 4rem);
        line-height: 1;
      }

      p {
        max-width: 560px;
        margin: 0;
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.8;
      }

      .eyebrow {
        color: #039841;
        font-size: 0.8rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .entry__actions {
        display: grid;
        gap: 14px;
      }

      .action-link {
        display: grid;
        gap: 8px;
        padding: 22px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 18px 48px rgba(29, 44, 34, 0.1);
        transition: transform 160ms ease, border-color 160ms ease;
      }

      .action-link:hover {
        transform: translateY(-2px);
        border-color: #a6b4aa;
      }

      .action-link span {
        font-size: 1.25rem;
        font-weight: 800;
      }

      .action-link small {
        color: var(--muted);
        line-height: 1.5;
      }

      .action-link--primary {
        border-color: rgba(6, 199, 85, 0.4);
      }

      @media (max-width: 840px) {
        .entry {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body class="shell">
    <main class="entry">
      <section class="entry__intro">
        <p class="eyebrow">LINE Login + Google Apps Script</p>
        <h1>學員審核系統</h1>
        <p>
          學員用 LINE 登入後，GAS 會寫入 LINE UUID、名稱與照片；師資端可檢視名單並設定審核通過。
        </p>
      </section>

      <nav class="entry__actions" aria-label="系統入口">
        <a class="action-link action-link--primary" href="student/">
          <span>學員系統</span>
          <small>LINE 登入與審核狀態</small>
        </a>
        <a class="action-link" href="teacher/">
          <span>師資系統</span>
          <small>學員列表與審核設定</small>
        </a>
      </nav>
    </main>
  </body>
</html>
