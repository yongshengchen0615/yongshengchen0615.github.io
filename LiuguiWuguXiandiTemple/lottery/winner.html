<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f7f4ed">
  <title>中獎抽取台</title>
  <style>
    :root {
      --bg: #f7f4ed;
      --ink: #161616;
      --muted: #6f736f;
      --line: #d9d4ca;
      --panel: #ffffff;
      --stage: #101113;
      --stage-soft: #1b1d20;
      --accent: #bd2f2b;
      --gold: #d9a827;
      --success: #0b8063;
      --shadow: 0 22px 70px rgba(20, 18, 14, 0.12);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background:
        linear-gradient(90deg, rgba(22, 22, 22, 0.05) 1px, transparent 1px),
        linear-gradient(180deg, rgba(22, 22, 22, 0.05) 1px, transparent 1px),
        var(--bg);
      background-size: 44px 44px;
    }

    button,
    input {
      font: inherit;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 26px 0 38px;
      animation: pageEnter 0.42s ease both;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1,
    h2,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 0;
      font-size: clamp(2.2rem, 6vw, 4.8rem);
      line-height: 0.98;
      letter-spacing: 0;
    }

    h2 {
      margin-bottom: 8px;
      font-size: clamp(1.25rem, 2.4vw, 1.9rem);
      letter-spacing: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
    }

    .badge[data-state="ready"] {
      color: var(--success);
    }

    .badge[data-state="busy"]::before {
      animation: pulse 0.9s ease-in-out infinite;
    }

    .badge[data-state="error"] {
      color: var(--accent);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(320px, 0.65fr);
      gap: 22px;
      padding-top: 24px;
    }

    .stage {
      position: relative;
      display: grid;
      min-height: 560px;
      overflow: hidden;
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(217, 168, 39, 0.22), transparent 34%),
        radial-gradient(circle at 80% 18%, rgba(189, 47, 43, 0.22), transparent 28%),
        linear-gradient(135deg, var(--stage-soft), var(--stage));
      color: #ffffff;
      box-shadow: var(--shadow);
      isolation: isolate;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(180deg, #000, transparent 88%);
      pointer-events: none;
      z-index: 1;
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: auto -8% -32% -8%;
      height: 45%;
      background: linear-gradient(180deg, transparent, rgba(217, 168, 39, 0.2));
      transform: skewY(-3deg);
      pointer-events: none;
      z-index: 1;
    }

    .stage__inner {
      position: relative;
      z-index: 2;
      display: grid;
      align-content: space-between;
      gap: 32px;
      min-height: 100%;
      padding: clamp(24px, 5vw, 54px);
    }

    .stage__label {
      display: inline-block;
      margin-bottom: 12px;
      color: rgba(255, 255, 255, 0.68);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .winner-number {
      display: block;
      min-height: clamp(90px, 16vw, 150px);
      color: #ffffff;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: clamp(4rem, 13vw, 9rem);
      font-weight: 900;
      line-height: 0.98;
      letter-spacing: 0;
      text-shadow: 0 10px 34px rgba(0, 0, 0, 0.34);
    }

    .winner-number.is-final {
      animation: winnerPop 0.56s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .winner-name {
      margin: 14px 0 0;
      color: rgba(255, 255, 255, 0.82);
      font-size: clamp(1.25rem, 3vw, 2rem);
      font-weight: 900;
      line-height: 1.35;
      word-break: break-word;
    }

    .winner-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 11px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.78);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .stage__actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 142px;
      min-height: 48px;
      padding: 12px 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--ink);
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease, color 0.16s ease;
    }

    .button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: #aaa49a;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.52;
    }

    .button--draw {
      border-color: var(--gold);
      background: var(--gold);
      color: #17130a;
    }

    .button--ghost {
      border-color: rgba(255, 255, 255, 0.22);
      background: transparent;
      color: #ffffff;
    }

    .side {
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
    }

    .controls {
      display: grid;
      gap: 16px;
      padding: 22px;
    }

    .field {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 800;
    }

    .field input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 12px;
      background: #ffffff;
      color: var(--ink);
      outline: none;
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .field input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(217, 168, 39, 0.2);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 2px 0 0;
    }

    .stat {
      min-height: 78px;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfaf6;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 800;
    }

    .stat strong {
      display: block;
      margin-top: 6px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 1.8rem;
      line-height: 1;
    }

    .message {
      min-height: 44px;
      margin: 0;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      line-height: 1.55;
    }

    .history {
      grid-column: 1 / -1;
      overflow: hidden;
    }

    .history__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 20px 22px;
      border-bottom: 1px solid var(--line);
    }

    .history__head h2 {
      margin-bottom: 0;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }

    th,
    td {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 900;
    }

    td {
      color: var(--ink);
      font-size: 0.95rem;
    }

    .number-cell {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-weight: 900;
    }

    .empty-row {
      color: var(--muted);
      text-align: center;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 10;
      width: min(560px, calc(100% - 32px));
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      color: var(--ink);
      transform: translate(-50%, 18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.is-visible {
      transform: translate(-50%, 0);
      opacity: 1;
    }

    .toast[data-type="error"] {
      border-color: rgba(189, 47, 43, 0.35);
      color: #961f1b;
    }

    @keyframes pageEnter {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%,
      100% {
        transform: scale(1);
        opacity: 0.7;
      }
      50% {
        transform: scale(1.45);
        opacity: 1;
      }
    }

    @keyframes winnerPop {
      from {
        opacity: 0.38;
        transform: translateY(8px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 900px) {
      .topbar {
        align-items: start;
        flex-direction: column;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .stage {
        min-height: 510px;
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100% - 24px, 1180px);
      }

      .stage__actions {
        display: grid;
      }

      .button {
        width: 100%;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .history__head {
        align-items: start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Lottery Draw Console</p>
        <h1>中獎抽取台</h1>
      </div>
      <div class="badge" id="connectionBadge" data-state="idle">尚未同步</div>
    </header>

    <main class="workspace">
      <section class="stage" aria-labelledby="stageTitle">
        <div class="stage__inner">
          <div>
            <span class="stage__label">Current Winner</span>
            <h2 id="stageTitle">本輪中獎號碼</h2>
            <output class="winner-number" id="winnerNumber">------</output>
            <p class="winner-name" id="winnerName">等待抽取</p>
            <div class="winner-meta">
              <span class="chip" id="winnerPrize">獎項未設定</span>
              <span class="chip" id="winnerTime">--</span>
            </div>
          </div>

          <div class="stage__actions">
            <button class="button button--draw" id="drawButton" type="button" disabled>抽出中獎者</button>
            <button class="button button--ghost" id="refreshButton" type="button">同步名單</button>
          </div>
        </div>
      </section>

      <aside class="side">
        <section class="panel controls" aria-labelledby="controlTitle">
          <h2 id="controlTitle">抽獎設定</h2>
          <label class="field">
            獎項名稱
            <input id="prizeName" type="text" autocomplete="off" value="現場抽獎">
          </label>
          <label class="field">
            管理密鑰
            <input id="adminToken" type="password" autocomplete="off">
          </label>

          <div class="stats" aria-live="polite">
            <div class="stat">
              <span>已領號碼</span>
              <strong id="drawnCount">0</strong>
            </div>
            <div class="stat">
              <span>已中獎</span>
              <strong id="winnerCount">0</strong>
            </div>
            <div class="stat">
              <span>可抽名單</span>
              <strong id="remainingCount">0</strong>
            </div>
            <div class="stat">
              <span>總人數</span>
              <strong id="totalCount">0</strong>
            </div>
          </div>

          <p class="message" id="systemMessage">正在讀取 GAS 名單。</p>
        </section>
      </aside>

      <section class="panel history" aria-labelledby="historyTitle">
        <div class="history__head">
          <h2 id="historyTitle">中獎紀錄</h2>
          <span class="badge" id="historyBadge" data-state="idle">0 筆</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>序</th>
                <th>摸彩號碼</th>
                <th>姓名</th>
                <th>獎項</th>
                <th>中獎時間</th>
              </tr>
            </thead>
            <tbody id="winnerRows">
              <tr>
                <td class="empty-row" colspan="5">尚無中獎紀錄</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <script>
    const DRAW_CONFIG = {
      GAS_WEB_APP_URL: "https://script.google.com/macros/s/AKfycbxvkPHXsB22b9hiFPtNY6m4IJ8wuc2rdXlEsbEPiudfXNhBsCuR64BPSxADIBsBK7tk/exec",
      ADMIN_TOKEN: "",
      WINNER_LIMIT: 20,
    };

    const state = {
      busy: false,
      board: null,
      rollingTimer: null,
      toastTimer: null,
    };

    const elements = {};

    document.addEventListener("DOMContentLoaded", () => {
      cacheElements();
      bindEvents();
      refreshBoard(false);
    });

    function cacheElements() {
      [
        "connectionBadge",
        "winnerNumber",
        "winnerName",
        "winnerPrize",
        "winnerTime",
        "drawButton",
        "refreshButton",
        "prizeName",
        "adminToken",
        "drawnCount",
        "winnerCount",
        "remainingCount",
        "totalCount",
        "systemMessage",
        "historyBadge",
        "winnerRows",
        "toast",
      ].forEach((id) => {
        elements[id] = document.getElementById(id);
      });
    }

    function bindEvents() {
      elements.drawButton.addEventListener("click", handleDrawWinner);
      elements.refreshButton.addEventListener("click", () => refreshBoard(true));
      elements.prizeName.addEventListener("input", renderPrizeLabel);
    }

    async function refreshBoard(showToastOnSuccess) {
      setBusy(true, "同步中");

      try {
        const board = await gasRequest("getWinnerBoard", buildPayload());
        state.board = board;
        renderBoard(board);
        setConnection("ready", "已同步");
        setSystemMessage(getBoardMessage(board));
        if (showToastOnSuccess) showToast("名單已同步", "success");
      } catch (error) {
        showError(error);
      } finally {
        setBusy(false);
      }
    }

    async function handleDrawWinner() {
      setBusy(true, "抽取中");
      startRollingNumber();
      setSystemMessage("正在從未中獎名單抽取。");

      try {
        const board = await gasRequest("drawWinner", buildPayload());
        state.board = board;
        stopRollingNumber();
        renderBoard(board, { animateCurrent: true });
        setConnection("ready", "已完成");
        setSystemMessage(board.currentWinner ? "中獎者已寫入 GAS。" : getBoardMessage(board));
        showToast("中獎紀錄已寫入 GAS", "success");
      } catch (error) {
        stopRollingNumber();
        renderBoard(state.board);
        showError(error);
      } finally {
        setBusy(false);
      }
    }

    async function gasRequest(action, payload) {
      const response = await fetch(DRAW_CONFIG.GAS_WEB_APP_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8",
        },
        body: JSON.stringify({ action, payload }),
      });

      const result = await response.json();
      if (!response.ok || !result.ok) {
        throw new Error(result.message || "GAS 請求失敗");
      }

      return result.data;
    }

    function buildPayload() {
      return {
        prizeName: elements.prizeName.value.trim() || "現場抽獎",
        adminToken: elements.adminToken.value.trim() || DRAW_CONFIG.ADMIN_TOKEN,
        limit: DRAW_CONFIG.WINNER_LIMIT,
      };
    }

    function renderBoard(board, options = {}) {
      renderStats(board && board.stats);
      renderWinnerRows(board && board.winners);

      if (board && board.currentWinner) {
        renderCurrentWinner(board.currentWinner, options.animateCurrent);
      } else if (!state.rollingTimer) {
        elements.winnerNumber.textContent = "------";
        elements.winnerNumber.classList.remove("is-final");
        elements.winnerName.textContent = "等待抽取";
        renderPrizeLabel();
        elements.winnerTime.textContent = "--";
      }

      updateButtons();
    }

    function renderCurrentWinner(winner, animate) {
      elements.winnerNumber.classList.remove("is-final");
      elements.winnerNumber.textContent = formatLotteryNumber(winner.lotteryNumber);
      elements.winnerName.textContent = winner.lineName || "未命名使用者";
      elements.winnerPrize.textContent = winner.winnerPrize || "現場抽獎";
      elements.winnerTime.textContent = winner.winnerAt || "--";

      if (animate) {
        window.requestAnimationFrame(() => {
          elements.winnerNumber.classList.add("is-final");
        });
      }
    }

    function renderStats(stats) {
      const values = stats || {
        totalUsers: 0,
        drawnNumbers: 0,
        winners: 0,
        remaining: 0,
      };

      elements.totalCount.textContent = values.totalUsers;
      elements.drawnCount.textContent = values.drawnNumbers;
      elements.winnerCount.textContent = values.winners;
      elements.remainingCount.textContent = values.remaining;
      elements.historyBadge.textContent = `${values.winners} 筆`;
      elements.historyBadge.dataset.state = values.winners > 0 ? "ready" : "idle";
    }

    function renderWinnerRows(winners) {
      const rows = winners || [];
      if (!rows.length) {
        elements.winnerRows.innerHTML = '<tr><td class="empty-row" colspan="5">尚無中獎紀錄</td></tr>';
        return;
      }

      elements.winnerRows.innerHTML = rows.map((winner, index) => `
        <tr>
          <td>${index + 1}</td>
          <td class="number-cell">${escapeHtml(formatLotteryNumber(winner.lotteryNumber))}</td>
          <td>${escapeHtml(winner.lineName || "未命名使用者")}</td>
          <td>${escapeHtml(winner.winnerPrize || "現場抽獎")}</td>
          <td>${escapeHtml(winner.winnerAt || "--")}</td>
        </tr>
      `).join("");
    }

    function renderPrizeLabel() {
      if (state.board && state.board.currentWinner) return;
      elements.winnerPrize.textContent = elements.prizeName.value.trim() || "現場抽獎";
    }

    function setBusy(isBusy, label) {
      state.busy = isBusy;
      if (isBusy) setConnection("busy", label || "處理中");
      updateButtons();
    }

    function updateButtons() {
      const remaining = state.board && state.board.stats ? Number(state.board.stats.remaining) : 0;
      elements.drawButton.disabled = state.busy || remaining <= 0;
      elements.refreshButton.disabled = state.busy;
      elements.prizeName.disabled = state.busy;
      elements.adminToken.disabled = state.busy;
    }

    function setConnection(stateName, label) {
      elements.connectionBadge.dataset.state = stateName;
      elements.connectionBadge.textContent = label;
    }

    function setSystemMessage(message) {
      elements.systemMessage.textContent = message;
    }

    function getBoardMessage(board) {
      if (!board || !board.stats) return "尚未取得 GAS 名單。";
      if (board.stats.drawnNumbers === 0) return "目前沒有已領號碼的使用者。";
      if (board.stats.remaining === 0) return "已領號碼的使用者皆已中獎。";
      return `目前還有 ${board.stats.remaining} 位可抽名單。`;
    }

    function showToast(message, type = "info") {
      window.clearTimeout(state.toastTimer);
      elements.toast.textContent = message;
      elements.toast.dataset.type = type;
      elements.toast.classList.add("is-visible");
      state.toastTimer = window.setTimeout(() => {
        elements.toast.classList.remove("is-visible");
      }, 2600);
    }

    function showError(error) {
      const message = error && error.message ? error.message : "發生未知錯誤";
      setConnection("error", "發生錯誤");
      setSystemMessage(message);
      showToast(message, "error");
    }

    function startRollingNumber() {
      stopRollingNumber();
      elements.winnerName.textContent = "抽取中";
      elements.winnerTime.textContent = "--";
      elements.winnerNumber.classList.remove("is-final");
      state.rollingTimer = window.setInterval(() => {
        elements.winnerNumber.textContent = String(100000 + Math.floor(Math.random() * 900000));
      }, 58);
    }

    function stopRollingNumber() {
      if (!state.rollingTimer) return;
      window.clearInterval(state.rollingTimer);
      state.rollingTimer = null;
    }

    function formatLotteryNumber(value) {
      return String(value || "").padStart(6, "0");
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
