<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#fbfbf8">
  <title>摸彩系統</title>
  <style>
    :root {
      --bg: #fbfbf8;
      --ink: #151515;
      --muted: #6b6f76;
      --line: #dedede;
      --panel: #ffffff;
      --panel-soft: #f2f4f1;
      --accent: #bd2f2b;
      --accent-strong: #961f1b;
      --success: #0b8063;
      --gold: #d9a827;
      --shadow: 0 18px 48px rgba(21, 21, 21, 0.08);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background:
        linear-gradient(90deg, rgba(21, 21, 21, 0.04) 1px, transparent 1px),
        linear-gradient(180deg, rgba(21, 21, 21, 0.04) 1px, transparent 1px),
        var(--bg);
      background-size: 42px 42px;
    }

    button {
      font: inherit;
    }

    .app-shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
      animation: enter 0.45s ease both;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1,
    h2,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 0;
      font-size: clamp(2.3rem, 6vw, 4.9rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    h2 {
      margin-bottom: 8px;
      font-size: clamp(1.35rem, 2.5vw, 2rem);
      letter-spacing: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
    }

    .badge[data-state="ready"] {
      color: var(--success);
    }

    .badge[data-state="busy"]::before {
      animation: pulse 0.9s ease-in-out infinite;
    }

    .badge[data-state="error"] {
      color: var(--accent);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(300px, 0.55fr);
      gap: 22px;
      padding-top: 24px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
    }

    .draw-panel {
      display: grid;
      gap: 22px;
      padding: clamp(22px, 4vw, 40px);
    }

    .section-copy {
      margin-bottom: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .ticket {
      position: relative;
      display: grid;
      gap: 12px;
      min-height: 260px;
      padding: clamp(24px, 5vw, 54px);
      overflow: hidden;
      border: 1px solid #202020;
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(217, 168, 39, 0.22), transparent 35%),
        linear-gradient(135deg, #1c1c1c 0%, #111111 100%);
      color: #fff;
      isolation: isolate;
    }

    .ticket::before,
    .ticket::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: var(--bg);
      transform: translateY(-50%);
      z-index: 2;
    }

    .ticket::before {
      left: -22px;
    }

    .ticket::after {
      right: -22px;
    }

    .ticket__shine {
      position: absolute;
      inset: -60% auto -60% -35%;
      width: 28%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.22), transparent);
      transform: rotate(18deg);
      animation: shine 3.8s ease-in-out infinite;
      pointer-events: none;
      z-index: 1;
    }

    .ticket__label {
      position: relative;
      z-index: 3;
      color: rgba(255, 255, 255, 0.72);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .lottery-number {
      position: relative;
      z-index: 3;
      min-height: clamp(84px, 14vw, 136px);
      color: #ffffff;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: clamp(3.2rem, 12vw, 8.4rem);
      font-weight: 900;
      line-height: 0.98;
      letter-spacing: 0;
      text-shadow: 0 8px 28px rgba(0, 0, 0, 0.34);
    }

    .number-state {
      position: relative;
      z-index: 3;
      color: rgba(255, 255, 255, 0.74);
      font-size: 1rem;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 142px;
      min-height: 48px;
      padding: 12px 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--ink);
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease, color 0.16s ease;
    }

    .button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: #a8a8a8;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    .button--primary {
      border-color: #06c755;
      background: #06c755;
      color: #07120a;
    }

    .button--accent {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .button--ghost {
      background: transparent;
    }

    .side-panel {
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .identity,
    .status-log {
      padding: 22px;
    }

    .identity__header {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 56px;
      height: 56px;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: var(--panel-soft);
      object-fit: cover;
    }

    .avatar--empty {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-weight: 900;
    }

    .identity__name {
      margin: 0 0 4px;
      font-size: 1.1rem;
      font-weight: 900;
      word-break: break-word;
    }

    .identity__uuid {
      margin: 0;
      color: var(--muted);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: 0.82rem;
      line-height: 1.45;
      word-break: break-all;
    }

    .detail-list {
      display: grid;
      gap: 12px;
      margin: 20px 0 0;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.92rem;
    }

    .detail-row strong {
      color: var(--ink);
      text-align: right;
      word-break: break-word;
    }

    .status-log {
      display: grid;
      gap: 8px;
      background: var(--panel-soft);
    }

    .status-log p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .status-log strong {
      color: var(--ink);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 10;
      width: min(560px, calc(100% - 32px));
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      color: var(--ink);
      transform: translate(-50%, 18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.is-visible {
      transform: translate(-50%, 0);
      opacity: 1;
    }

    .toast[data-type="error"] {
      border-color: rgba(189, 47, 43, 0.35);
      color: var(--accent-strong);
    }

    @keyframes enter {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%,
      100% {
        transform: scale(1);
        opacity: 0.7;
      }
      50% {
        transform: scale(1.45);
        opacity: 1;
      }
    }

    @keyframes shine {
      0% {
        transform: translateX(0) rotate(18deg);
      }
      48%,
      100% {
        transform: translateX(720%) rotate(18deg);
      }
    }

    @media (max-width: 820px) {
      .topbar {
        align-items: start;
        flex-direction: column;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .actions {
        display: grid;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">LINE Lottery</p>
        <h1>摸彩系統</h1>
      </div>
      <div class="badge" id="connectionBadge" data-state="idle">尚未連線</div>
    </header>

    <main class="workspace">
      <section class="panel draw-panel" aria-labelledby="drawTitle">
        <div>
          <h2 id="drawTitle">摸彩號碼</h2>
          <p class="section-copy" id="drawSubtitle">登入 LINE 後會同步使用者資料，已抽取過的使用者會直接顯示原本號碼。</p>
        </div>

        <div class="ticket" aria-live="polite">
          <span class="ticket__shine" aria-hidden="true"></span>
          <span class="ticket__label">Lottery Number</span>
          <output class="lottery-number" id="lotteryNumber">------</output>
          <div class="number-state" id="numberState">等待 LINE 登入</div>
        </div>

        <div class="actions">
          <button class="button button--primary" id="loginButton" type="button">LINE 登入</button>
          <button class="button button--accent" id="drawButton" type="button" disabled>抽取摸彩號碼</button>
          <button class="button button--ghost" id="syncButton" type="button" disabled>同步資料</button>
        </div>
      </section>

      <aside class="side-panel">
        <section class="panel identity" aria-labelledby="identityTitle">
          <h2 id="identityTitle">使用者資料</h2>
          <div class="identity__header">
            <div class="avatar avatar--empty" id="avatarFallback">LINE</div>
            <img class="avatar" id="avatarImage" alt="" hidden>
            <div>
              <p class="identity__name" id="lineName">尚未登入</p>
              <p class="identity__uuid" id="lineUuid">UUID 尚未取得</p>
            </div>
          </div>
          <div class="detail-list">
            <div class="detail-row">
              <span>資料狀態</span>
              <strong id="syncState">尚未同步</strong>
            </div>
            <div class="detail-row">
              <span>抽取狀態</span>
              <strong id="drawState">尚未抽取</strong>
            </div>
          </div>
        </section>

        <section class="panel status-log" aria-live="polite">
          <strong>系統訊息</strong>
          <p id="systemMessage">請先完成 LINE 登入。</p>
        </section>
      </aside>
    </main>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js" defer></script>
  <script src="script.js" defer></script>
</body>
</html>
