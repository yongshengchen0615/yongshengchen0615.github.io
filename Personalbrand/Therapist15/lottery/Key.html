<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>一鍵產生金鑰 + 更新試算表 + 顯示 QR Code</title>

  <!-- QRCode.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      background: #f9fafb;
      color: #111827;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      max-width: 640px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      border: 1px solid #e5e7eb;
    }
    h1 {
      margin: 0 0 12px 0;
      font-size: 1.3rem;
      color: #1f2937;
    }
    .key {
      font-family: monospace;
      font-size: 1.05rem;
      padding: 10px;
      border-radius: 8px;
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      word-break: break-all;
      color: #111827;
    }
    .btns {
      margin-top: 12px;
      text-align: center;
    }
    button {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 500;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .primary {
      background: #2563eb;
      color: #ffffff;
    }
    .primary:hover {
      background: #1e40af;
    }
    .status {
      margin-top: 10px;
      color: #4b5563;
      min-height: 1.2em;
    }
    .qr-wrapper {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    #qrcode {
      background: #ffffff;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>一鍵產生 20 碼金鑰 → 寫入 Google 試算表 → 產生 QR Code</h1>

    <div>
      <div style="font-size:0.9rem;color:#6b7280">目前金鑰內容：</div>
      <div id="generatedKey" class="key">（載入中...）</div>
    </div>

    <div class="btns">
      <button id="generateAll" class="primary">🚀 一鍵產生 + 寫入 + QR Code</button>
    </div>

    <div class="status" id="status">狀態：初始化中...</div>

    <div class="qr-wrapper">
      <div style="font-size:0.9rem;color:#6b7280">金鑰 QR Code：</div>
      <div id="qrcode">（尚未產生）</div>
    </div>

    <hr style="margin-top:16px;border:none;border-top:1px solid #e5e7eb" />

    <div style="font-size:0.85rem;color:#6b7280">
      請修改以下兩個變數以配合你的 Apps Script：
      <ul style="margin:4px 0 0 18px;padding:0;">
        <li><code>API_URL</code>：你的 Apps Script Web App URL（結尾為 /exec）</li>
        <li><code>ADMIN_SECRET</code>：與 Apps Script 端設定相同的驗證密鑰</li>
      </ul>
    </div>
  </div>

  <script>
    // ===== 這兩個要改成你的 =====
    const API_URL = 'https://script.google.com/macros/s/AKfycbzdBxKNDeZSXpS9a08118ak9BDN7sJPu_ZZzXrPVFREAVXoL73JQXhRG1h5pEH6MR_P/exec';
    const ADMIN_SECRET = '123456789';
    // ============================

    const generateAllBtn = document.getElementById('generateAll');
    const generatedKeyEl = document.getElementById('generatedKey');
    const statusEl = document.getElementById('status');
    const qrContainer = document.getElementById('qrcode');

    // 產生 20 碼亂數
    function randomAlphaNum(len = 20) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      return Array.from({ length: len }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    }

    // 產生 QR Code
    function renderQr(key) {
      qrContainer.innerHTML = '';
      new QRCode(qrContainer, {
        text: key,
        width: 200,
        height: 200,
        colorDark: "#111827",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M
      });
    }

    // 初始化：抓目前試算表 A2 的值
    async function fetchCurrentKey() {
      try {
        statusEl.textContent = '🔍 正在讀取目前金鑰...';
        const url = API_URL + '?action=get&secret=' + encodeURIComponent(ADMIN_SECRET);
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);

        const data = await res.json();
        if (data.ok && data.key) {
          generatedKeyEl.textContent = data.key;
          statusEl.textContent = '✅ 已載入目前金鑰。';
          renderQr(data.key);
        } else {
          generatedKeyEl.textContent = '（尚未產生）';
          statusEl.textContent = '⚠️ 試算表尚無金鑰，請點擊按鈕產生。';
        }
      } catch (err) {
        generatedKeyEl.textContent = '（讀取失敗）';
        statusEl.textContent = '❌ 無法讀取金鑰：' + err.message;
      }
    }

    // 一鍵產生 + 寫入 + 產 QR
    async function updateSheetAndShowQr() {
      const key = randomAlphaNum(20);
      generatedKeyEl.textContent = key;
      qrContainer.textContent = '產生中...';
      statusEl.textContent = '正在寫入試算表...';

      try {
        const url = API_URL + '?action=update&key=' + encodeURIComponent(key) + '&secret=' + encodeURIComponent(ADMIN_SECRET);
        const res = await fetch(url, { method: 'GET' });
        if (!res.ok) throw new Error('HTTP ' + res.status);

        const data = await res.json();
        if (data.ok && data.updated) {
          statusEl.textContent = '✅ 已更新試算表並產生 QR Code。';
          renderQr(key);
        } else {
          throw new Error(data.error || '未知錯誤');
        }
      } catch (err) {
        statusEl.textContent = '❌ 更新失敗：' + err.message;
        qrContainer.textContent = '（更新失敗）';
      }
    }

    generateAllBtn.addEventListener('click', updateSheetAndShowQr);

    // 頁面載入時先抓目前金鑰
    fetchCurrentKey();
  </script>
</body>
</html>
